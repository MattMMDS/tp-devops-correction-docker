---
# tasks file for roles/proxy

- name: Start HTTPD

  docker_container:
    name: http-server

    image: mattmarques/tp-devops-httpd

    restart_policy: unless-stopped

    ports:
      - "80:80"

    networks:
      - name: app-network

  vars:
    ansible_python_interpreter: /opt/docker_venv/bin/python
