name: Deploy with ansible

on:
  workflow_run:
    workflows: ["CD devops 2025"]
    types:
      - completed
    branches:
      - main

jobs:

  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v3

      - name: Install Ansible
        run: |
          pip install ansible

      - name: Deploy
        run: |
          ansible-playbook \
          -i inventory.ini \
          playbook.yml

        env:
          ANSIBLE_HOST_KEY_CHECKING: False