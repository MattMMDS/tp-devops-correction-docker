services:
  backend:
    build:
      context: ./simpleapi
    container_name: back-api
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/db
      SPRING_DATASOURCE_USERNAME: usr
      SPRING_DATASOURCE_PASSWORD: pwd
    expose:
      - "8080"

    depends_on:
      - database

    networks:
      - app-network

  database:
    build:
      context: ./database
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: db
      POSTGRES_USER: usr
      POSTGRES_PASSWORD: pwd
    volumes:
      - postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - app-network

  frontend:
    build:
      context: ./front
    container_name: front
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - app-network

  httpd:
    build:
      context: ./http-server
    container_name: http-server
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
